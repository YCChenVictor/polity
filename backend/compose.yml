services:
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - 5000:5000
      - 9229:9229
    networks:
      - app-network
  db-dev:
    image: postgres:16.3 # avoid using latest tag
    restart: unless-stopped
    ports:
      - 5430:5430
    command: -p 5430
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - app-network
networks:
  app-network:
    driver: bridge
