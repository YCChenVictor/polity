version: "3.9"
services:
  ipfs:
    image: ipfs/kubo:latest
    ports:
      - "5001:5001"
      - "8080:8080"
    volumes:
      - ipfs-data:/data/ipfs
    entrypoint: >
      sh -lc '
        ipfs config Addresses.API --json "\"/ip4/0.0.0.0/tcp/5001\"" &&
        ipfs config Addresses.Gateway --json "\"/ip4/0.0.0.0/tcp/8080\"" &&
        exec /sbin/tini -- ipfs daemon --migrate=true
      '
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    restart: unless-stopped
    ports:
      - "5000:5000"
  contract:
    build:
      context: ./smart-contracts
      dockerfile: Dockerfile
    ports:
      - "8545:8545"
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: ./frontend/.env
    restart: unless-stopped
    ports:
      - "3000:3000"
volumes:
  ipfs-data:
