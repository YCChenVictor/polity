version: "3.9"
services:
  ipfs:
    build: ./ipfs
    image: ipfs/kubo:latest
    ports:
      - "5001:5001"
    volumes:
      - ipfs-data:/data/ipfs
  contract:
    build:
      context: ./smart-contracts
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8545:8545"
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: ./frontend/.env
    restart: unless-stopped
    ports:
      - "3000:3000"
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    restart: unless-stopped
    ports:
      - "5000:5000"
volumes:
  ipfs-data:
