version: "3.9"
services:
  ipfs:
    image: ipfs/kubo:latest
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/v0/id"]
      interval: 10s
      timeout: 3s
      retries: 10
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    restart: unless-stopped
    ports:
      - "5000:5000"
  contract:
    build:
      context: ./smart-contracts
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8545:8545"
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: ./frontend/.env
    restart: unless-stopped
    ports:
      - "3000:3000"
volumes:
  ipfs-data:
