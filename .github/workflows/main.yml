name: polity CI
on:
  pull_request:
    branches: [ main ]
jobs:
  mini:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./mini
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1
      with:
        version: nightly
    - name: Build smart contracts
      working-directory: ./smart-contracts
      run: forge build
    - name: Install dependencies
      run: yarn install --frozen-lockfile
    - name: Lint Code
      run: yarn eslint
    - name: Start IPFS (Docker)
      run: |
        docker run -d --name ipfs \
          -p 127.0.0.1:5001:5001 \
          ipfs/kubo:latest
    - name: Wait for IPFS
      run: |
        for i in {1..30}; do
          curl -s http://127.0.0.1:5001/api/v0/version && exit 0
          sleep 1
        done
        echo "IPFS did not start in time" >&2
        exit 1
    - name: Run tests
      run: yarn test:bail
  smart-contracts:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./smart-contracts
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1
      with:
        version: stable
    - name: Lint Code
      run: forge fmt --check
    - name: Run tests
      run: forge test
